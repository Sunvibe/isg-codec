substitutions:
  name: fmnet-heatpump-native
  friendly_name: THZ 5.5 Eco

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ../components
    components: [thz55eco]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:

ota:
  platform: esphome

logger:
  level: DEBUG
  hardware_uart: UART0

usb_host:
  enable_hubs: false
  max_transfer_requests: 32

usb_uart:
  - type: cp210x
    vid: 0x10C4
    pid: 0xEA60
    channels:
      - id: thz_uart
        baud_rate: 115200
        data_bits: 8
        parity: NONE
        stop_bits: 1
        buffer_size: 1024
        dummy_receiver: false

thz55eco:
  id: thz
  uart_id: thz_uart
  update_interval: 60s
  byte_timeout: 1200ms
  initial_flush_timeout: 200ms
  startup_delay: 10s
  request_delay: 1200ms
  max_retry: 5

